name: Refresh hot sprint prices

on:
  schedule:
    - cron: "20 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Refresh TWSE reference prices
        run: node scripts/refresh-hot-sprint.mjs
      - name: Commit refreshed feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hot-sprint.json
          git diff --cached --quiet || git commit -m "chore: refresh hot sprint prices"
          git push
